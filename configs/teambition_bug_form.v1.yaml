# Teambition defect form mapping draft.
# This file is not loaded by runtime yet. It is a reviewed draft for later development.
# Sources:
# - C:\2_PROJECT\proj\config-v1.md from teacher-captured interface data.
# - Read-only OpenAPI checks on the existing local test project.
# - Prior read-only UI inspection of the company Teambition bug form.
# - Live field capture and create/query probes on 2026-06-10 and 2026-06-11.

source_status:
  company_project_openapi:
    project_id: "6539bbd14c06f79e66aaf526"
    status: "blocked"
    reason: "Current .env Teambition app returned: Resource not belong to tenant."
  chrome_read:
    status: "not_run_this_round"
    reason: "Chrome was not running. Extension and native host are installed and enabled."
  old_created_tasks_read:
    status: "read_only_done"
    note: "Only GET /v3/project/{projectId}/task/query was used. No create API was called."
    observed_old_project:
      tasklist_id: "6a219252d859396314d11b8c"
      scenariofieldconfig_id: "6a219252d859396314d11b9f"
      taskflow_status_ids:
        completed: "6a219252d859396314d11b89"
        open: "6a219252d859396314d11b8a"
      stage_id: "6a219252d859396314d11b95"
      priority_values_seen:
        - -10
        - 0
      visible: "projectMembers"
  url2spec_capture:
    status: "partial"
    note: "Captured useful request shapes and several IDs, but not enough to replace the real company bug form mapping."
    confirmed_ids:
      organization_id: "61cc0d32e6b157bfbb39f309"
      project_id: "6539bbd14c06f79e66aaf526"
      observed_user_id: "6a14ffee2dfe137452f632a9"
    observed_uncertain_ids:
      customfield_popup_id: "6554658a1e4983d3f404b3d3"
      customfield_popup_sfc_id: "6539bbd2e9176a0f484eddc2"
      customfieldentity_choices_id: "655331a78e5e1d8680403b49"
    useful_endpoints:
      member_search:
        method: "GET"
        path: "/api/tasks/new/members/search"
        query: "q=&scope=executor.assign&projectId={project_id}&organizationId={organization_id}"
        use_for: "Resolve executor/tester/resolver member IDs after browser cookie is valid."
        last_seen_status: "401 InvalidCookie in URL2SPEC replay"
      customfield_choices:
        method: "GET"
        path: "/api/v2/projects/{project_id}/customfieldentities/choices"
        query: "customfieldId={customfield_id}&customfieldentityId={customfieldentity_id}"
        use_for: "Resolve option IDs for related_project and related_database after the correct field/entity IDs are known."
        last_seen_status: "401 InvalidCookie in URL2SPEC replay"
      customfield_popup:
        method: "GET"
        path: "/api/customfields/{customfield_id}/popup"
        query: "objectType=task&_organizationId={organization_id}&_projectId={project_id}&sfcId={sfc_id}"
        use_for: "Inspect popup options for a specific custom field if permission allows."
        last_seen_status: "403 NoPermission in URL2SPEC replay"
  live_field_capture:
    status: "first_stage_verified"
    note: "priority 0-5 and defect_category full object were verified by real create/query probes."


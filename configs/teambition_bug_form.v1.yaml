fields:
  title:
    label: "标题"
    system_field: "content"
    required: true

  executor:
    label: "执行者"
    system_field: "executorId"
    required: true
    type: "member"
    default_rule: "待认领 or configured member"

  description:
    label: "备注"
    system_field: "note"
    required: true
    format: "按模板写【步骤】【结果】【期望】"
    template: |
      【步骤】
      {steps}

      【结果】
      {actual}

      【期望】
      {expected}

  start_time:
    label: "开始时间"
    system_field: "startDate"
    required: true
    default_rule: "ask_user"

  due_time:
    label: "截止时间"
    system_field: "dueDate"
    required: true
    default_rule: "ask_user"

  defect_category:
    label: "缺陷分类"
    customfield_id: "6539bbd2973d59497934d82b"
    required: true
    type: "commongroup"
    default:
      title: "企业版线上缺陷 / 线上缺陷"
      id: "655c8ace7c4907e734c6a851"
    options:
